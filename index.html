<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- Link external CSS (optional) -->
    <!-- <link rel="stylesheet" href="style.css"> -->

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5f5;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #2563eb;
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 My Website</h1>
    <p></p>
    <a href="#" class="btn">Get Started</a>
</header>

<footer>
    <p>© 2026 My Site</p>
</footer>

</body>
</html>
